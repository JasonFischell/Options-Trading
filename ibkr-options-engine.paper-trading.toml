[broker]
host = "127.0.0.1"
platform = "gateway"
port = 4002
client_id = 100
account = "DUQ212633"
runtime_mode = "paper"
read_only = false
connect_on_start = true
run_mode = "scheduled"
scan_schedule = "0 45 9,12,15 * * MON-FRI"
market_data_mode = "live"

[universe]
tickers_file = "docs/nasdaqlisted_symbols_sorted.csv"
# tickers = ["AAPL", "MSFT"]

[strategy]
expiration_dates = ["20260508"]
min_underlying_price = 1.0
max_underlying_price = 20.0
min_profit_dollars_per_share = 0.05
min_profit_pct_of_investment = 1.0
min_profit_buffer_pct = 0.10
