min_option_bid = 0.08
max_option_spread_pct = 0.25
default_beta = 1.5

[allocation]
deployment_budget = 20000.0
capital_source = "available_funds"
max_distribution_per_symbol_pct = 10.0
min_cash_reserve_pct = 5.0
max_new_trades_per_cycle = 25
max_open_positions = 50

[performance]
